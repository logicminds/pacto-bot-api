name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-dependencies:
    name: Cache dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Populate Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Warm dependency cache
        run: cargo fetch --locked

  lint-and-format:
    name: Validate
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

      # no need to run on every PR, as it is slow and not critical for CI. It can be run manually if needed.
      # - name: Check cargo deny
      #   run: |
      #     cargo install --locked cargo-deny
      #     cargo deny check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: cache-dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests and generate coverage reports
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
          cargo llvm-cov report --html --output-dir coverage-html
          cargo llvm-cov report --json --summary-only > coverage.json

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
          if-no-files-found: error

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14
          if-no-files-found: error

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          retention-days: 14
          if-no-files-found: error

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-json

      - name: Enforce 80% coverage floor
        run: |
          python3 - <<'PY'
          import json, sys
          with open('coverage.json') as f:
              data = json.load(f)
          total = data.get('data', [{}])[0].get('totals', {}).get('lines', {})
          covered = total.get('covered', 0)
          count = total.get('count', 0)
          if count == 0:
              print('No lines found; treating as 0% coverage.')
              sys.exit(1)
          pct = covered / count * 100
          print(f'Line coverage: {pct:.2f}% ({covered}/{count})')
          if pct < 80:
              print('Coverage is below the required 80% floor.')
              sys.exit(1)
          PY

      - name: Post coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            const total = data.data?.[0]?.totals?.lines || {};
            const covered = total.covered || 0;
            const count = total.count || 0;
            const pct = count ? (covered / count * 100).toFixed(2) : '0.00';
            const body = `## Coverage Report\n\nLine coverage: **${pct}%** (${covered}/${count})\n\nMinimum required: **80%**`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: cache-dependencies
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check docs build
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  build-release:
    name: Build release
    runs-on: ubuntu-latest
    needs: [cache-dependencies, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Build release binaries
        run: cargo build --workspace --bins --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-api-release
          path: |
            target/release/pacto-bot-api
            target/release/pacto-bot-admin
          retention-days: 7
          if-no-files-found: error
