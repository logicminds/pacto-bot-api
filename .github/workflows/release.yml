name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            asset: darwin_amd64
          - target: aarch64-apple-darwin
            asset: darwin_arm64
          - target: x86_64-unknown-linux-musl
            asset: linux_amd64
          - target: aarch64-unknown-linux-musl
            asset: linux_arm64
          - target: x86_64-pc-windows-gnu
            asset: windows_amd64
          - target: x86_64-unknown-freebsd
            asset: freebsd_amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version 0.23.0

      - name: Build release binary
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pacto-bot-api-${{ matrix.target }}
          path: target/${{ matrix.target }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pacto-bot-api-*

      - name: Reconstruct target layout
        run: |
          mkdir -p target
          for artifact_dir in artifacts/pacto-bot-api-*; do
            target_triple=$(basename "$artifact_dir" | sed 's/^pacto-bot-api-//')
            mv "$artifact_dir" "target/$target_triple"
          done

      - name: Package artifacts
        run: ./scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
