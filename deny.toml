# cargo-deny configuration for pacto-bot-api.

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
ignore = [
    # `instant` is unmaintained but pulled in by the nostr ecosystem;
    # no upgraded version is available yet.
    "RUSTSEC-2024-0384",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]

[bans]
# The nostr dependency graph currently includes multiple versions of several
# crates (getrandom, rand, nostr itself, etc.). Allow duplicates until the
# ecosystem converges.
multiple-versions = "warn"
wildcards = "warn"
