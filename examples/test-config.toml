# Example config for the echo-bot reference handler.
# Tests overwrite the npub/nsec with freshly generated keys at runtime.
# This file itself must be mode 0o600 or stricter when used by the daemon.

[daemon]
data_dir = "./tmp-test-data"
socket_path = "./tmp-test-data/pacto-bot-api.sock"

[[bots]]
id = "echo-bot"
npub = "npub1replace_me_in_tests..."
signing = { backend = "nsec", nsec = "nsec1replace_me_in_tests..." }
relays = ["ws://127.0.0.1:5555"]
capabilities = ["ReadMessages", "SendMessages"]
